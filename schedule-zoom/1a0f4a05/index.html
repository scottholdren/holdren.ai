<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Your Interview - Honest Design Studio</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f8f9fa; color: #333; }
  .container { text-align: center; padding: 40px; max-width: 480px; }
  h1 { font-size: 1.4em; font-weight: 600; margin-bottom: 8px; }
  p { color: #666; font-size: 0.95em; margin-bottom: 24px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e0e0e0; border-top: 3px solid #2F5496; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  a { color: #2F5496; text-decoration: none; font-weight: 500; }
</style>
<script src="../../config.js"></script>
</head>
<body>
<div class="container">
  <div class="spinner"></div>
  <h1>Redirecting to scheduler...</h1>
  <p>If you are not redirected automatically, <a href="https://scheduler.zoom.us/scott-holdren/20-mins-with-scott">click here</a>.</p>
</div>
<script>
(function() {
  var applicantId = "1a0f4a05";
  var applicantName = "Misaq Albasha";
  var dest = "https://scheduler.zoom.us/scott-holdren/20-mins-with-scott";
  var webhookUrl = window._hds_webhook || "";

  function doRedirect() {
    window.location.href = dest;
  }

  var timer = setTimeout(doRedirect, 3000);

  if (!webhookUrl) {
    clearTimeout(timer);
    doRedirect();
    return;
  }

  fetch("https://ipinfo.io/json")
    .then(function(r) { return r.json(); })
    .then(function(geo) {
      return fetch(webhookUrl, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({
          id: applicantId,
          name: applicantName,
          ip: geo.ip || "",
          city: geo.city || "",
          region: geo.region || "",
          country: geo.country || "",
          loc: geo.loc || "",
          org: geo.org || "",
          timezone: geo.timezone || "",
          ts: new Date().toISOString(),
          ua: navigator.userAgent
        })
      });
    })
    .catch(function() {})
    .finally(function() {
      clearTimeout(timer);
      doRedirect();
    });
})();
</script>
</body>
</html>
