<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title and page.title != site.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    {% if page.description %}<meta name="description" content="{{ page.description }}">{% elsif site.description %}<meta name="description" content="{{ site.description }}">{% endif %}
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1><a href="{{ '/' | absolute_url }}">{{ site.title }}</a></h1>
        {% if site.description %}<p>{{ site.description }}</p>{% endif %}
        <p class="social">
          <a href="https://github.com/scottholdren">GitHub</a><br>
          <a href="https://www.linkedin.com/in/scottholdren/">LinkedIn</a><br>
          <a href="https://pinside.com/pinball/community/pinsiders/scottholdren">Pinside</a><br>
          <a href="mailto:scott@holdren.com">Email</a>
        </p>
      </header>
      <section>
        {{ content }}
      </section>
      <footer>
        <p><small>&copy; {{ 'now' | date: '%Y' }} Scott Holdren</small></p>
      </footer>
    </div>
  </body>
</html>
