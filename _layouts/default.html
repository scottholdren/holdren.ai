<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
{% if page.description %}<meta name="description" content="{{ page.description }}">{% elsif site.description %}<meta name="description" content="{{ site.description }}">{% endif %}
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<style>
  :root {
    --text: #1a1a1a;
    --muted: #666;
    --link: #2F5496;
    --rule: #e5e5e5;
    --bg: #fff;
  }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    background: var(--bg);
    max-width: 42rem;
    margin: 0 auto;
    padding: 2.5rem 1.25rem 5rem;
    line-height: 1.6;
    font-size: 18px;
  }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  header.site {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 3rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--rule);
  }
  header.site .brand {
    font-weight: 600;
    font-size: 1.1rem;
    color: var(--text);
  }
  header.site nav a { margin-left: 1rem; color: var(--muted); }
  h1 { font-size: 1.8rem; line-height: 1.25; margin: 0 0 0.5rem; }
  h2 { font-size: 1.3rem; line-height: 1.3; margin: 2.25rem 0 0.75rem; }
  h3 { font-size: 1.1rem; margin: 1.75rem 0 0.5rem; }
  p, ul, ol { margin: 0 0 1.1rem; }
  .post-meta { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
  article p { text-wrap: pretty; }
  article figure {
    margin: 2rem 0;
  }
  article figure img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 4px;
  }
  article figure figcaption {
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
    margin-top: 0.5rem;
    font-style: italic;
  }
  hr { border: none; border-top: 1px solid var(--rule); margin: 3rem 0; }
  .post-list { list-style: none; padding: 0; }
  .post-list li { margin-bottom: 1.5rem; }
  .post-list .date { color: var(--muted); font-size: 0.9rem; display: block; }
  .post-list .title { font-size: 1.15rem; font-weight: 500; }
  footer.site {
    margin-top: 5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--rule);
    color: var(--muted);
    font-size: 0.9rem;
  }
</style>
</head>
<body>
<header class="site">
  <a class="brand" href="/">{{ site.title }}</a>
  <nav><a href="/">Writing</a></nav>
</header>
<main>
{{ content }}
</main>
<footer class="site">
  © {{ 'now' | date: '%Y' }} Scott Holdren
</footer>
</body>
</html>
